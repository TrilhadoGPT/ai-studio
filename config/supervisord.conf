[supervisord]
nodaemon=true
user=root
logfile=/app/logs/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/app/logs/nginx_error.log
stdout_logfile=/app/logs/nginx_access.log

[program:image_api]
command=/opt/venv/bin/gunicorn --bind 0.0.0.0:8000 --workers 1 --timeout 600 --threads 4 api.image_api:app
directory=/app
autostart=true
autorestart=true
stderr_logfile=/app/logs/image_api_error.log
stdout_logfile=/app/logs/image_api.log
environment=PYTHONPATH="/app"

[program:video_api]
command=/opt/venv/bin/gunicorn --bind 0.0.0.0:8001 --workers 1 --timeout 1800 --threads 2 api.video_api:app
directory=/app
autostart=true
autorestart=true
stderr_logfile=/app/logs/video_api_error.log
stdout_logfile=/app/logs/video_api.log
environment=PYTHONPATH="/app"
