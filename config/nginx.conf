user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;
    
    # Logging
    access_log /app/logs/nginx_access.log;
    error_log /app/logs/nginx_error.log;
    
    # Upstream servers
    upstream image_api {
        server 127.0.0.1:8000;
    }
    
    upstream video_api {
        server 127.0.0.1:8001;
    }
    
    server {
        listen 80;
        server_name _;
        
        # Main endpoint
        location / {
            return 200 '{"status":"AI-STUDIO API Running","services":["image","video"]}';
            add_header Content-Type application/json;
        }
        
        # Image API
        location /api/image/ {
            proxy_pass http://image_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
        }
        
        # Video API
        location /api/video/ {
            proxy_pass http://video_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 1800s;
            proxy_connect_timeout 1800s;
        }
        
        # Health check
        location /health {
            proxy_pass http://image_api/health;
        }
        
        # Outputs (for file download)
        location /outputs/ {
            alias /app/outputs/;
            autoindex on;
        }
    }
}
